  <!-- ─── Sıkça Sorulan Sorular (FAQ Schema — Google'da yıldızlı sonuç) ─── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Ders programı nasıl yapılır?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "OkulPro ile ders programı yapmak çok kolay: 1) Öğretmen, sınıf ve ders bilgilerini girin. 2) Hangi öğretmenin hangi sınıfa hangi dersi vereceğini belirleyin. 3) 'Programı Hazırla' butonuna basın. Sistem otomatik olarak çakışmasız bir program oluşturur."
        }
      },
      {
        "@type": "Question",
        "name": "OkulPro ücretsiz mi?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Demo veriyle ücretsiz olarak sınırsız deneyebilirsiniz. Kendi okul bilgilerinizi girip program oluşturmak için yıllık 1000 TL lisans gereklidir."
        }
      },
      {
        "@type": "Question",
        "name": "Hangi okul türleri için uygun?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "İlkokul, ortaokul, lise, İmam Hatip lisesi ve meslek liseleri için uygundur. 120'den fazla branş tanımlıdır (Sınıf öğretmenliği, Matematik, Fen Bilimleri, Kur'an-ı Kerim, Tefsir, Hadis dahil tüm İmam Hatip dersleri, ve lise branşları)."
        }
      },
      {
        "@type": "Question",
        "name": "Derslik çakışmasını nasıl önler?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Fen laboratuvarı, spor salonu, bilgisayar sınıfı gibi ortak kullanılan mekanları tanımlayabilirsiniz. Sistem otomatik olarak iki sınıfın aynı anda aynı dersliği kullanmasını engeller."
        }
      },
      {
        "@type": "Question",
        "name": "Hazırladığım programı yazdırabilir miyim?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Evet, A4 yatay olarak temiz çıktı alabilir, PDF olarak kaydedebilirsiniz. Tüm sınıfları, tek bir sınıfı, tüm öğretmenleri veya tek bir öğretmeni yazdırabilirsiniz."
        }
      },
      {
        "@type": "Question",
        "name": "Kurulum gerekir mi?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Hayır, hiçbir kurulum gerektirmez. Web tarayıcısından (Chrome, Edge, Safari) doğrudan kullanabilirsiniz. Bilgisayar, tablet veya telefondan çalışır."
        }
      }
    ]
  }
  </script>
