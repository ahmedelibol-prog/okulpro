<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>OkulPro Pro — Lisans Yöneticisi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#1e293b;border-radius:16px;border:1px solid #334155;padding:32px;max-width:520px;width:100%}
h1{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{color:#64748b;font-size:13px;margin-bottom:24px}
label{display:block;font-size:11px;color:#94a3b8;margin-bottom:4px}
input,select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:14px;outline:none;margin-bottom:12px}
button{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:8px}
button:hover{opacity:0.9}
.key-box{background:#0f172a;border:2px solid #3b82f6;border-radius:10px;padding:16px;text-align:center;margin:16px 0}
.key{font-size:22px;font-family:monospace;font-weight:700;color:#60a5fa;letter-spacing:0.12em}
.copy-btn{background:#334155;font-size:13px;padding:8px;margin-top:8px}
.log{margin-top:20px;border-top:1px solid #334155;padding-top:16px}
.log-row{padding:6px 10px;background:#0f172a;border-radius:6px;margin-bottom:4px;font-size:12px;display:flex;justify-content:space-between}
.badge{background:#1e4d2b;color:#6ee7b7;padding:2px 8px;border-radius:4px;font-size:10px}
.divider{border:none;border-top:1px solid #334155;margin:20px 0}
.check-box{background:#0f172a;border-radius:10px;padding:16px;margin-top:12px}
</style>
</head>
<body>
<div class="card">
  <h1>📅 OkulPro Pro</h1>
  <p>Lisans Yöneticisi — Yalnızca satıcı kullanımı içindir</p>

  <!-- KEY GENERATOR -->
  <div>
    <label>Okul / Müşteri Adı</label>
    <input id="schoolName" placeholder="Örn: Atatürk Ortaokulu" />
    <label>Lisans Türü</label>
    <select id="licType">
      <option value="FULL">🏫 Tam Lisans (1 Yıl) — 499₺</option>
      <option value="TRIAL">🔓 Genişletilmiş Demo (3 Ay) — Ücretsiz</option>
      <option value="MULTI">🏢 Çoklu Okul (5 Okul) — 1999₺</option>
    </select>
    <button onclick="generate()">🔑 Lisans Anahtarı Oluştur</button>
  </div>

  <div id="result" style="display:none">
    <div class="key-box">
      <div style="font-size:11px;color:#64748b;margin-bottom:6px">Oluşturulan Lisans Anahtarı</div>
      <div class="key" id="genKey"></div>
      <div style="font-size:11px;color:#475569;margin-top:6px" id="keyInfo"></div>
    </div>
    <button class="copy-btn" onclick="copyKey()">📋 Kopyala</button>
  </div>

  <hr class="divider">

  <!-- KEY VALIDATOR -->
  <div>
    <label>Anahtar Doğrula</label>
    <div style="display:flex;gap:6px">
      <input id="checkKey" placeholder="Müşteriden gelen anahtarı girin" style="margin:0;flex:1" />
      <button onclick="checkKey()" style="width:auto;padding:10px 16px;margin:0;font-size:13px">Doğrula</button>
    </div>
    <div id="checkResult" class="check-box" style="display:none"></div>
  </div>

  <hr class="divider">

  <!-- LOG -->
  <div class="log">
    <div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:8px">📋 Oluşturulan Anahtarlar</div>
    <div id="log"></div>
    <div id="emptyLog" style="color:#475569;font-size:12px;text-align:center;padding:12px">Henüz anahtar oluşturulmadı</div>
  </div>
</div>

<script>
const keys = JSON.parse(localStorage.getItem("okulpro_keys") || "[]");
renderLog();

function generate() {
  const name = document.getElementById("schoolName").value.trim();
  const type = document.getElementById("licType").value;
  if (!name) { alert("Okul adı girin!"); return; }

  const base = "DP" + type.slice(0,1) + Date.now().toString(36).toUpperCase().slice(-6) + name.replace(/\s/g,"").slice(0,3).toUpperCase();
  const sum = base.split("").reduce((s,c) => s + c.charCodeAt(0), 0) % 100;
  const key = base + String(sum).padStart(2,"0");

  document.getElementById("genKey").textContent = key;
  document.getElementById("keyInfo").textContent = `${name} · ${type === "FULL" ? "1 Yıl" : type === "TRIAL" ? "3 Ay" : "5 Okul"} · ${new Date().toLocaleDateString("tr-TR")}`;
  document.getElementById("result").style.display = "block";

  const record = { key, name, type, date: new Date().toLocaleDateString("tr-TR") };
  keys.unshift(record);
  try { localStorage.setItem("okulpro_keys", JSON.stringify(keys.slice(0, 50))); } catch(e) {}
  renderLog();
}

function copyKey() {
  const key = document.getElementById("genKey").textContent;
  navigator.clipboard.writeText(key).then(() => {
    const btn = document.querySelector(".copy-btn");
    btn.textContent = "✅ Kopyalandı!";
    setTimeout(() => btn.textContent = "📋 Kopyala", 2000);
  });
}

function checkKey() {
  const key = document.getElementById("checkKey").value.trim().toUpperCase();
  const res = document.getElementById("checkResult");
  res.style.display = "block";

  if (!key) { res.innerHTML = '<span style="color:#fca5a5">Anahtar girin</span>'; return; }

  const body = key.slice(0, -2);
  const check = key.slice(-2);
  const sum = body.split("").reduce((s, c) => s + c.charCodeAt(0), 0) % 100;
  const valid = String(sum).padStart(2,"0") === check;

  const record = keys.find(k => k.key === key);
  if (valid) {
    const type = key.startsWith("DPF") ? "Tam Lisans" : key.startsWith("DPT") ? "Demo" : "Çoklu";
    res.innerHTML = `<span style="color:#6ee7b7">✅ Geçerli Anahtar</span><br><span style="color:#94a3b8;font-size:11px">Tür: ${type}${record ? " · " + record.name + " · " + record.date : ""}</span>`;
  } else {
    res.innerHTML = '<span style="color:#fca5a5">❌ Geçersiz Anahtar</span>';
  }
}

function renderLog() {
  const log = document.getElementById("log");
  const empty = document.getElementById("emptyLog");
  if (!keys.length) { log.innerHTML = ""; empty.style.display = "block"; return; }
  empty.style.display = "none";
  log.innerHTML = keys.slice(0, 20).map(k => `
    <div class="log-row">
      <div>
        <span style="font-family:monospace;font-size:11px;color:#60a5fa">${k.key}</span>
        <span style="color:#94a3b8;margin-left:6px;font-size:11px">${k.name}</span>
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <span class="badge">${k.type}</span>
        <span style="color:#475569;font-size:10px">${k.date}</span>
      </div>
    </div>`).join("");
}
</script>
</body>
</html>
